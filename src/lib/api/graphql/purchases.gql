query Purchases($findPurchasesArgs: FindPurchasesArgs!) {
  purchases(findPurchasesArgs: $findPurchasesArgs) {
    data {
      guid
      reference
      status
      tcg
      total
      notes
      buyer {
        guid
        name
      }
      seller {
        guid
        name
        phone
        email
        notes
      }
      items {
        guid
        condition
        offerPrice
        referencePrice
        sellPrice
        quantity
        tcg
        pokemonCardSummary {
          guid
          name
          setName
          setCode
          cardNumber
          rarity
          imageUri
        }
        magicCardSummary {
          guid
          name
          edition
          collectorNumber
          rarity
          imageUri
          isFoil
        }
      }
      payments {
        amount
        method
      }
      createdDate
      updatedDate
    }
    count
  }
}

query Purchase($guid: String!) {
  purchase(guid: $guid) {
    guid
    reference
    status
    tcg
    total
    notes
    buyer {
      guid
      name
    }
    seller {
      guid
      name
      phone
      email
      notes
    }
    items {
      guid
      condition
      offerPrice
      referencePrice
      sellPrice
      quantity
      tcg
      pokemonCardSummary {
        guid
        name
        setName
        setCode
        cardNumber
        rarity
        imageUri
      }
      magicCardSummary {
        guid
        name
        edition
        collectorNumber
        rarity
        imageUri
        isFoil
      }
    }
    payments {
      amount
      method
    }
    createdBy {
      guid
      name
    }
    createdDate
    updatedDate
  }
}

